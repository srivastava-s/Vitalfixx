# ──────────────────────────────────────────────────────────
# VitalFix — Daily Health Check
# Runs at midnight IST (18:30 UTC) every day.
# Posts results to a persistent GitHub Issue.
# ──────────────────────────────────────────────────────────

name: "Daily Health Check"

on:
  schedule:
    # 18:30 UTC = 00:00 IST (midnight)
    - cron: "30 18 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    name: Full Quality Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Quality checks (continue on error to collect all results) ──

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Type-check
        id: typecheck
        run: npm run type-check
        continue-on-error: true

      - name: Tests
        id: tests
        run: npm run test
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: E2E Tests
        id: e2e
        run: npm run test:e2e
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Dependency audit
        id: audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Bundle size snapshot
        id: bundle
        run: |
          if [ -d ".next" ]; then
            TOTAL_SIZE=$(du -sh .next | cut -f1)
            echo "size=$TOTAL_SIZE" >> "$GITHUB_OUTPUT"

            echo "### 📦 Bundle Breakdown" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Directory | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----------|------|" >> "$GITHUB_STEP_SUMMARY"
            du -sh .next/*/ 2>/dev/null | while read size dir; do
              dirname=$(basename "$dir")
              echo "| \`$dirname\` | $size |" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "| **Total** | **$TOTAL_SIZE** |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "size=N/A (build failed)" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Report to GitHub Issue ──

      - name: Post daily health report
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
            const sha = context.sha.substring(0, 7);

            const status = (outcome) => outcome === 'success' ? '✅' : '❌';

            const lint     = status('${{ steps.lint.outcome }}');
            const typecheck = status('${{ steps.typecheck.outcome }}');
            const tests    = status('${{ steps.tests.outcome }}');
            const e2e      = status('${{ steps.e2e.outcome }}');
            const build    = status('${{ steps.build.outcome }}');
            const audit    = status('${{ steps.audit.outcome }}');
            const bundleSize = '${{ steps.bundle.outputs.size }}' || 'N/A';

            const allPassed = ['${{ steps.lint.outcome }}', '${{ steps.typecheck.outcome }}', '${{ steps.tests.outcome }}', '${{ steps.e2e.outcome }}', '${{ steps.build.outcome }}'].every(o => o === 'success');
            const header = allPassed ? '## ✅ All Checks Passed' : '## ⚠️ Issues Detected';

            const body = [
              `${header}`,
              ``,
              `**Date:** ${now}`,
              `**Commit:** [\`${sha}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
              `**Triggered by:** ${context.eventName === 'schedule' ? '⏰ Scheduled' : '🔧 Manual'}`,
              ``,
              `| Check | Status |`,
              `|-------|--------|`,
              `| ESLint | ${lint} |`,
              `| TypeScript | ${typecheck} |`,
              `| Tests | ${tests} |`,
              `| E2E Tests | ${e2e} |`,
              `| Production Build | ${build} |`,
              `| Dependency Audit | ${audit} |`,
              `| Bundle Size | 📦 ${bundleSize} |`,
              ``,
              `---`,
              `*Run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n');

            // Find or create the persistent health report issue
            const title = '📊 Daily Health Report';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'daily-health',
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              // Create new issue with label
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'daily-health',
                  color: '0e8a16',
                  description: 'Automated daily health check reports',
                });
              } catch (e) {
                // Label may already exist
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['daily-health'],
              });
            }

      # ── Fail the workflow if core checks failed ──

      - name: Evaluate results
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.e2e.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "❌ One or more core checks failed. See the health report issue for details."
          exit 1
